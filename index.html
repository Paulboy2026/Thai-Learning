<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Practice App (Expanded)</title>
    <style>
        :root { --primary: #00247D; --accent: #CF142B; --bg: #f4f6f9; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .option-btn { background: #fff; border: 2px solid #cbd5e1; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 8px; text-align: left; cursor: pointer; }
        .option-btn:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Thai Practice (Male)</h1>
    <label for="topic-nav">Choose a Topic:</label>
    <select id="topic-nav" onchange="loadCategory(this.value)" style="width: 100%; padding: 10px; margin-bottom: 15px;">
        <option value="Basics">Basics</option>
        <option value="Food">Food & Meat</option>
        <option value="Fruit">Fruit</option>
        <option value="Weather">Weather</option>
        <option value="Numbers">Numbers 1-100</option>
    </select>

    <div id="question" style="font-size: 20px; margin: 20px 0; font-weight: bold;">Loading...</div>
    <div id="transliteration" style="font-style: italic; color: #555; margin-bottom: 10px;"></div>
    <button class="btn" onclick="speakQuestion()">🔊 Listen to Thai</button>
    <div id="options-container"></div>
    <div id="feedback" style="font-weight: bold; text-align: center; margin-top: 10px;"></div>
</div>

<script>
    const questionBank = {
        "Basics": [
            { q: "สวัสดีครับ", t: "Sawatdee khub", a: "Hello" },
            { q: "ขอบคุณครับ", t: "Khob khun khub", a: "Thank you" },
            { q: "ห้องน้ำอยู่ที่ไหนครับ", t: "Hong nam yoo tee nai khub", a: "Where is the toilet" },
            { q: "ราคาเท่าไหร่ครับ", t: "Ra-ka tao-rai khub", a: "How much is it" }
        ],
        "Food": [
            { q: "ผมอยากทานไก่ครับ", t: "Pom yak tan gai khub", a: "I want to eat chicken" },
            { q: "ผมอยากทานเนื้อวัวครับ", t: "Pom yak tan nuea wua khub", a: "I want to eat beef" },
            { q: "ผมอยากทานหมูครับ", t: "Pom yak tan moo khub", a: "I want to eat pork" }
        ],
        "Fruit": [
            { q: "ผมชอบทานมะละกอครับ", t: "Pom chob tan ma-la-kor khub", a: "I like to eat papaya" },
            { q: "ผมชอบทานสับปะรดครับ", t: "Pom chob tan sap-pa-rod khub", a: "I like to eat pineapple" },
            { q: "ผมชอบทานขนุนครับ", t: "Pom chob tan ka-noon khub", a: "I like to eat jackfruit" }
        ],
        "Weather": [
            { q: "วันนี้อากาศร้อนครับ", t: "Wan-nee a-kat ron khub", a: "It is hot today" },
            { q: "วันนี้อากาศเย็นครับ", t: "Wan-nee a-kat yen khub", a: "It is cold today" },
            { q: "ฝนกำลังจะตกครับ", t: "Fon kam-lang ja tok khub", a: "It is going to rain" }
        ],
        "Numbers": Array.from({length: 100}, (_, i) => ({
            q: (i + 1).toString(), t: "Number " + (i + 1), a: (i + 1).toString()
        }))
    };

    let currentPool = [];
    let currentQuestion = null;

    function loadCategory(category) {
        currentPool = questionBank[category] || [];
        loadRandomQuestion();
    }

    function loadRandomQuestion() {
        if (currentPool.length === 0) return;
        currentQuestion = currentPool[Math.floor(Math.random() * currentPool.length)];
        
        document.getElementById('question').innerText = currentQuestion.q;
        document.getElementById('transliteration').innerText = currentQuestion.t;
        document.getElementById('feedback').innerText = "";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        let options = [currentQuestion.a];
        while (options.length < 4) {
            let randomQ = currentPool[Math.floor(Math.random() * currentPool.length)];
            if (!options.includes(randomQ.a)) options.push(randomQ.a);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                if (opt === currentQuestion.a) {
                    document.getElementById('feedback').innerText = "Correct! ✅";
                    setTimeout(loadRandomQuestion, 1000);
                } else {
                    document.getElementById('feedback').innerText = "Try again! ❌";
                }
            };
            container.appendChild(b);
        });
    }

    function speakQuestion() { 
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentQuestion.q);
        u.lang = 'th-TH';
        window.speechSynthesis.speak(u); 
    }

    window.onload = () => loadCategory("Basics");
</script>
</body>
</html>
