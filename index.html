<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKVI A1 - Nuanjan</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --primary: #00247D; --accent: #CF142B; --bg: #f4f6f9; --card: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .option-btn { background: white; border: 2px solid #cbd5e1; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>UKVI A1 - Nuanjan</h1>
    <select id="topic-nav" onchange="jumpToQuestion(this.value)"></select>
    <div id="question" style="font-size: 20px; margin: 20px 0; font-weight: bold;">Loading...</div>
    
    <button class="btn" onclick="speakQuestion()">🔊 Listen</button>
    <button id="record-btn" class="btn" onclick="toggleRecording()">Start Recording</button>
    <button id="playback-btn" class="btn" onclick="playYourVoice()" disabled>Listen to Yourself</button>
    
    <div id="options-container"></div>
    <button id="next-btn" class="btn" style="display:none; background-color: var(--accent);" onclick="nextQuestion()">Next Question ➡️</button>
    <div id="feedback" style="margin: 10px 0; font-weight: bold; text-align: center;"></div>
</div>

<script>
    const data = [
        { topic: "Personal Details", question: "Could you tell me your full name, please?", options: ["My name is Nuanjan.", "I come from Bangkok."], answer: "My name is Nuanjan." },
        { topic: "Personal Details", question: "Can you spell your first name?", options: ["Yes, it is N-U-A-N-J-A-N.", "Yes, I like spelling."], answer: "Yes, it is N-U-A-N-J-A-N." },
        { topic: "Personal Details", question: "How old are you?", options: ["I am twenty-nine years old.", "I am thirty years old."], answer: "I am twenty-nine years old." },
        { topic: "Daily Life", question: "What do you usually do in the morning?", options: ["I have breakfast and coffee.", "I like watching TV."], answer: "I have breakfast and coffee." },
        { topic: "Housing", question: "How many rooms are there in your house?", options: ["There are five rooms.", "I live in a big city."], answer: "There are five rooms." },
        { topic: "Travel", question: "How do you travel to the city center?", options: ["I usually take the bus.", "I walk to the park."], answer: "I usually take the bus." },
        { topic: "Weather", question: "What is the weather like in your country today?", options: ["It is very hot and sunny.", "It is raining."], answer: "It is very hot and sunny." },
        { topic: "Work", question: "What time do you start work?", options: ["I start work at eight.", "I work at a company."], answer: "I start work at eight." },
        { topic: "Shopping", question: "How much is this shirt?", options: ["It is twenty pounds.", "It is a blue shirt."], answer: "It is twenty pounds." },
        { topic: "Leisure", question: "What is your favorite hobby?", options: ["I like reading books.", "I like going to work."], answer: "I like reading books." },
        { topic: "Food", question: "What is your favorite food?", options: ["My favorite food is Thai Pad Thai.", "I have lunch at one."], answer: "My favorite food is Thai Pad Thai." },
        { topic: "Education", question: "Why do you want to live in the UK?", options: ["To live with my husband and study.", "I want to visit London."], answer: "To live with my husband and study." }
    ];

    let currentIndex = 0, mediaRecorder, audioUrl, isRecording = false;

    function populateNavigation() {
        const nav = document.getElementById('topic-nav');
        data.forEach((item, index) => {
            const opt = document.createElement('option');
            opt.value = index; opt.innerText = `${index + 1}. ${item.topic}`;
            nav.appendChild(opt);
        });
    }

    function speakQuestion() { 
        window.speechSynthesis.cancel(); 
        const u = new SpeechSynthesisUtterance(document.getElementById('question').innerText);
        u.lang = 'en-GB'; u.rate = 0.9;
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
        window.speechSynthesis.speak(u); 
    }

    async function toggleRecording() {
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => { audioUrl = URL.createObjectURL(new Blob(chunks)); document.getElementById('playback-btn').disabled = false; };
            mediaRecorder.start(); isRecording = true; document.getElementById('record-btn').innerText = "🛑 Stop";
        } else {
            mediaRecorder.stop(); isRecording = false; document.getElementById('record-btn').innerText = "Start Recording";
        }
    }

    function playYourVoice() { 
        if (audioUrl) {
            const audio = new Audio(audioUrl);
            audio.play().catch(e => alert("Please tap again to allow audio."));
        }
    }

    function jumpToQuestion(index) { currentIndex = parseInt(index); loadQuestion(); }
    function nextQuestion() { currentIndex = (currentIndex + 1) % data.length; loadQuestion(); }

    function loadQuestion() {
        const q = data[currentIndex];
        document.getElementById('question').innerText = q.question;
        document.getElementById('topic-nav').value = currentIndex;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('feedback').innerText = "";
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = opt;
            b.onclick = () => {
                document.getElementById('feedback').innerText = (opt === q.answer) ? "Correct! 🌟" : "Incorrect.";
                document.getElementById('next-btn').style.display = "block";
            };
            container.appendChild(b);
        });
    }

    window.onload = () => { populateNavigation(); loadQuestion(); };
</script>
</body>
</html>
