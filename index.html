<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learn Thai Practice</title>
    <style>
        :root { --primary: #FFD700; --accent: #CF142B; --bg: #f4f6f9; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .btn { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .option-btn { background: #fff; border: 2px solid #cbd5e1; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 8px; text-align: left; cursor: pointer; }
        .option-btn:hover { background: #e2e8f0; }
        .transliteration { color: #555; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Thai Language Practice</h1>
    <div id="question" style="font-size: 22px; margin: 20px 0; font-weight: bold;">Loading...</div>
    <div id="transliteration" class="transliteration"></div>
    <button class="btn" onclick="speakQuestion()">🔊 Listen to Thai</button>
    <div id="options-container"></div>
    <div id="feedback" style="font-weight: bold; text-align: center; margin-top: 10px;"></div>
</div>

<script>
    const questionBank = [
        { q: "สวัสดีครับ/ค่ะ", t: "Sawatdee krub/ka", a: "Hello" },
        { q: "คุณชื่ออะไรครับ/ค่ะ?", t: "Khun cheu arai krub/ka?", a: "What is your name?" },
        { q: "สบายดีไหม?", t: "Sabai dee mai?", a: "How are you?" },
        { q: "ขอบคุณครับ/ค่ะ", t: "Khob khun krub/ka", a: "Thank you" },
        { q: "ห้องน้ำอยู่ที่ไหน?", t: "Hong nam yoo tee nai?", a: "Where is the toilet?" },
        { q: "นี่ราคาเท่าไหร่?", t: "Nee ra-ka tao-rai?", a: "How much is this?" },
        { q: "ขอโทษครับ/ค่ะ", t: "Kor tod krub/ka", a: "Sorry / Excuse me" },
        { q: "ผม/ฉันหิวข้าว", t: "Phom/Chan hiu khao", a: "I am hungry" },
        { q: "คุณพูดภาษาอังกฤษได้ไหม?", t: "Khun pood pasa ang-krit dai mai?", a: "Can you speak English?" },
        { q: "ไปที่นี่ได้ไหม?", t: "Pai tee nee dai mai?", a: "Can you go to this place?" }
    ];

    let currentQuestion = null;

    function loadRandomQuestion() {
        currentQuestion = questionBank[Math.floor(Math.random() * questionBank.length)];
        document.getElementById('question').innerText = currentQuestion.q;
        document.getElementById('transliteration').innerText = "(" + currentQuestion.t + ")";
        document.getElementById('feedback').innerText = "";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        let options = [currentQuestion.a];
        while (options.length < 4) {
            let randomOpt = questionBank[Math.floor(Math.random() * questionBank.length)].a;
            if (!options.includes(randomOpt)) options.push(randomOpt);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                if (opt === currentQuestion.a) {
                    document.getElementById('feedback').innerText = "Correct! ✅";
                    setTimeout(loadRandomQuestion, 1500);
                } else {
                    document.getElementById('feedback').innerText = "Try again! ❌";
                }
            };
            container.appendChild(b);
        });
    }

    function speakQuestion() { 
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentQuestion.q);
        u.lang = 'th-TH'; // Sets the voice to Thai
        window.speechSynthesis.speak(u); 
    }

    window.onload = loadRandomQuestion;
</script>
</body>
</html>
