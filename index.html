<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKVI A1 App - Nuanjan</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --primary: #00247D; --accent: #CF142B; --bg: #f4f6f9; --card: #ffffff; --text: #333333; --recording: #dc2626; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .score-board { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { border: 2px solid #e2e8f0; padding: 20px; text-align: center; margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .option-btn { background: white; border: 2px solid #cbd5e1; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; text-align: left; }
        .recording { background-color: var(--recording) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>UKVI A1 - Nuanjan's App</h1>
    <div class="score-board">
        <span>Score: <span id="score">0</span></span>
        <select id="topic-nav" onchange="jumpToQuestion(this.value)"></select>
    </div>

    <div class="card">
        <div id="question">Loading...</div>
        <button class="btn" onclick="speakQuestion()">🔊 Listen</button>
        <button id="record-btn" class="btn" onclick="toggleRecording()">Start Recording</button>
        <button id="playback-btn" class="btn" onclick="playYourVoice()" disabled>Listen to Yourself</button>
    </div>

    <div id="options-container"></div>
    <button class="btn" id="next-btn" onclick="nextQuestion()" style="display:none; background-color: var(--accent);">Next Question ➡️</button>
</div>

<script>
    const data = [
        { topic: "Personal Details", question: "Could you tell me your full name, please?", options: ["My name is Nuanjan.", "I come from Bangkok."], answer: "My name is Nuanjan." },
        { topic: "Personal Details", question: "Can you spell your first name for me?", options: ["Yes, it is N-U-A-N-J-A-N.", "Yes, I like spelling."], answer: "Yes, it is N-U-A-N-J-A-N." },
        { topic: "Personal Details", question: "How old are you?", options: ["I am twenty-nine years old.", "I am thirty years old."], answer: "I am twenty-nine years old." }
    ];

    let currentIndex = 0, score = 0, mediaRecorder = null, audioUrl = null, isRecording = false;

    function populateNavigation() {
        const nav = document.getElementById('topic-nav');
        data.forEach((item, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.innerText = `${index + 1}. ${item.topic}`;
            nav.appendChild(opt);
        });
    }

    function jumpToQuestion(index) {
        currentIndex = parseInt(index);
        saveAppState();
        loadQuestion();
    }

    function saveAppState() { localStorage.setItem('ukvi_app_state', JSON.stringify({ index: currentIndex, score: score })); }

    function loadQuestion() {
        const q = data[currentIndex];
        document.getElementById('question').innerText = q.question;
        document.getElementById('topic-nav').value = currentIndex;
        document.getElementById('next-btn').style.display = "none";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                if(opt === q.answer) { score += 10; document.getElementById('score').innerText = score; }
                document.getElementById('next-btn').style.display = "block";
            };
            container.appendChild(b);
        });
    }

    function speakQuestion() { 
        const u = new SpeechSynthesisUtterance(document.getElementById('question').innerText);
        u.lang = 'en-GB'; window.speechSynthesis.speak(u); 
    }

    async function toggleRecording() {
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => { audioUrl = URL.createObjectURL(new Blob(chunks)); document.getElementById('playback-btn').disabled = false; };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('record-btn').innerText = "🛑 Stop";
            document.getElementById('record-btn').classList.add('recording');
        } else {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('record-btn').innerText = "Start Recording";
            document.getElementById('record-btn').classList.remove('recording');
        }
    }

    function playYourVoice() { if (audioUrl) new Audio(audioUrl).play(); }
    function nextQuestion() { currentIndex++; saveAppState(); loadQuestion(); }

    window.onload = () => { populateNavigation(); loadQuestion(); };
</script>
</body>
</html>
