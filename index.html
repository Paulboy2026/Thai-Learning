<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKVI A1 App - Nuanjan</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary: #00247D; --accent: #CF142B; --bg: #f4f6f9; --card: #ffffff; --text: #333333; --recording: #dc2626; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .option-btn { background: white; border: 2px solid #cbd5e1; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>UKVI A1 - Nuanjan</h1>
    <select id="topic-nav" onchange="jumpToQuestion(this.value)"></select>
    <div id="question" style="font-size: 20px; margin: 20px 0;">Loading...</div>
    <button class="btn" onclick="speakQuestion()">🔊 Listen</button>
    <div id="options-container"></div>
    <div id="feedback" style="margin: 10px 0; font-weight: bold;"></div>
</div>

<script>
    const data = [
        { topic: "Personal Details", question: "Could you tell me your full name, please?", options: ["My name is Nuanjan.", "I come from Bangkok."], answer: "My name is Nuanjan." },
        { topic: "Personal Details", question: "Can you spell your first name?", options: ["Yes, it is N-U-A-N-J-A-N.", "Yes, I like spelling."], answer: "Yes, it is N-U-A-N-J-A-N." }
    ];

    let currentIndex = 0;

    function populateNavigation() {
        const nav = document.getElementById('topic-nav');
        data.forEach((item, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.innerText = `${index + 1}. ${item.topic}`;
            nav.appendChild(opt);
        });
    }

    function speakQuestion() { 
        // Force reset the synthesis engine to fix Chrome/Safari silence issues
        window.speechSynthesis.cancel(); 
        const text = document.getElementById('question').innerText;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-GB';
        u.rate = 0.9;
        
        if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
        }
        
        window.speechSynthesis.speak(u); 
    }

    function jumpToQuestion(index) {
        currentIndex = parseInt(index);
        loadQuestion();
    }

    function loadQuestion() {
        const q = data[currentIndex];
        document.getElementById('question').innerText = q.question;
        document.getElementById('topic-nav').value = currentIndex;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                document.getElementById('feedback').innerText = (opt === q.answer) ? "Correct! 🌟" : "Incorrect.";
            };
            container.appendChild(b);
        });
    }

    window.onload = () => { populateNavigation(); loadQuestion(); };
</script>
</body>
</html>
