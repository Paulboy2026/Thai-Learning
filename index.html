<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKVI A1 - 100 Question Bank</title>
    <style>
        :root { --primary: #00247D; --accent: #CF142B; --bg: #f4f6f9; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .option-btn { background: #fff; border: 2px solid #cbd5e1; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>UKVI A1 Practice</h1>
    <div id="question" style="font-size: 20px; margin: 20px 0; font-weight: bold;">Loading...</div>
    <button class="btn" onclick="speakQuestion()">🔊 Listen</button>
    <div id="options-container"></div>
    <button id="next-btn" class="btn" style="display:none; background-color: var(--accent);" onclick="loadRandomQuestion()">Next Question ➡️</button>
    <div id="feedback" style="font-weight: bold; text-align: center;"></div>
</div>

<script>

        ],
        "Routine": [
            { q: "What time do you get up?", a: "I get up at seven o'clock." },
            { q: "What do you do in the morning?", a: "I have breakfast and coffee." },
            { q: "What time do you have breakfast?", a: "I have breakfast at eight." },
            { q: "Do you go to work?", a: "I am a homemaker." },
            { q: "What do you do in the evening?", a: "I watch television and relax." },
            { q: "What time do you go to bed?", a: "I go to bed at ten o'clock." },

            { q: "What do you do on weekends?", a: "I visit the market and relax." },

            { q: "What do you do after breakfast?", a: "I clean the house." },
            { q: "Do you watch the news?", a: "Yes, I watch it in the morning." },
            { q: "Do you go out in the afternoon?", a: "Sometimes, I go to the market." },
            { q: "How often do you clean your house?", a: "I clean it every day." },
            { q: "Do you listen to music?", a: "Yes, I like listening to music." },
            { q: "Do you read books?", a: "Yes, I like reading in the evening." },
            { q: "What time is your lunch?", a: "I have lunch at twelve o'clock." },
            { q: "Do you go to bed early?", a: "Yes, I am usually tired at night." }

            { q: "How do you travel to the city center?", a: "I usually take the train." },
            { q: "Do you like traveling?", a: "Yes, I like traveling." },
            { q: "How do you go to the supermarket?", a: "I go by taxi." },
            { q: "Is the transport good in your city?", a: "Yes, it is very convenient." },
            { q: "Have you been to London?", a: "No, not yet." },
            { q: "How long does it take to get to the city?", a: "It takes thirty minutes." },
            { q: "Do you prefer bus or train?", a: "I prefer the train." },
            { q: "Do you have a driving license?", a: "No, I do not." },
            { q: "How do you get to the airport?", a: "I go by taxi." },
            { q: "Do you travel by boat?", a: "No, I do not." },

            { q: "Do you like walking in the city?", a: "Yes, it is nice." },
            { q: "Is the airport far away?", a: "Yes, it is 30 minutes away." },
            { q: "Do you prefer taxi or bus?", a: "I prefer the taxi." }
        ],
        "Shopping & Food": [
            { q: "Where do you buy your food?", a: "I buy food at the supermarket." },
            { q: "How much is this shirt?", a: "It is twenty pounds." },
            { q: "What is your favorite food?", a: "My favorite food is Pad Thai." },
            { q: "Do you like shopping?", a: "Yes, I like shopping for clothes." },
            { q: "What fruit do you like?", a: "I like papaya and pineapple." },
            { q: "Do you drink coffee?", a: "Yes, I drink coffee every morning." },
            { q: "Is the food expensive here?", a: "No, it is cheap." },
            { q: "What is your favorite drink?", a: "I like Thai tea." },

        ],
        "Health & Education": [
            { q: "What do you do to keep fit?", a: "I go for a walk in the park." },
            { q: "Do you like the weather here?", a: "It is a bit hot for me." },
            { q: "Why do you want to live in the UK?", a: "To live with my husband." },
            { q: "Do you speak English?", a: "I am learning." },
            { q: "What subjects do you like?", a: "I like English." },
            { q: "Are you healthy?", a: "Yes, I am healthy." },
            { q: "Do you visit the doctor?", a: "Only when I am sick." },
            { q: "What is the weather in Thailand?", a: "It is hot and sunny." },
            { q: "Do you study every day?", a: "Yes, I practice speaking." },
            { q: "What is your goal for this year?", a: "I want to pass my English test." },
            { q: "Do you want to work in the UK?", a: "Yes, I would like to find a job." },
            { q: "What kind of job do you want?", a: "I want to work in a shop." },
            { q: "Can you use a computer?", a: "Yes, I can use a computer." },
            { q: "Do you have any work experience?", a: "Yes, I worked at Nissan for a few years." },
            { q: "How do you learn English?", a: "I use apps and watch videos." },
            { q: "Do you like studying English?", a: "Yes, it is very interesting." },
            { q: "Is English difficult for you?", a: "It is a little bit difficult." },
            { q: "Do you study with a teacher?", a: "No, I study by myself." },
            { q: "How many hours do you study?", a: "I study for two hours a day." },
            { q: "Do you have a laptop?", a: "no, I dont have a laptop." }
        ]
    };

    // Flattening the object to a single array for easier random picking
    let allQuestions = [];
    Object.values(questionBank).forEach(category => allQuestions.push(...category));

    function loadRandomQuestion() {
        const q = allQuestions[Math.floor(Math.random() * allQuestions.length)];
        document.getElementById('question').innerText = q.question;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('feedback').innerText = "";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = "Click to show answer";
        b.onclick = () => {
            b.innerText = q.a;
            document.getElementById('feedback').innerText = "Correct! ✅";
            document.getElementById('next-btn').style.display = "block";
            
            // Speak the answer
            const u = new SpeechSynthesisUtterance(q.a);
            u.lang = 'en-GB';
            window.speechSynthesis.speak(u);
        };
        container.appendChild(b);
    }

    function speakQuestion() { 
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(document.getElementById('question').innerText);
        u.lang = 'en-GB';
        window.speechSynthesis.speak(u); 
    }

    window.onload = loadRandomQuestion;
</script>
</body>
</html>
