<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKVI A1 App - Nuanjan</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary: #00247D; --accent: #CF142B; --bg: #f4f6f9; --card: #ffffff; --text: #333333; --recording: #dc2626; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        h1 { text-align: center; color: var(--primary); margin-top: 0; font-size: 24px; }
        .progress-container { width: 100%; background-color: #e2e8f0; border-radius: 10px; margin-bottom: 5px; height: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background-color: var(--accent); transition: width 0.4s ease-in-out; }
        .days-count { font-size: 12px; color: #64748b; margin-bottom: 15px; text-align: center; font-weight: 600; }
        .score-board { display: flex; justify-content: space-between; align-items: center; background: #eef2f7; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        .card { border: 2px solid #e2e8f0; border-radius: 10px; padding: 20px; text-align: center; margin-bottom: 20px; background: #fafafa; }
        .topic-tag { display: inline-block; background: var(--primary); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
        .thai-hint { color: #d97706; font-weight: 500; font-size: 15px; margin-top: 5px; background: #fef3c7; padding: 6px; border-radius: 6px; display: inline-block; }
        .question-text { font-size: 22px; font-weight: 600; margin: 15px 0; color: #1e293b; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; transition: background 0.2s; font-weight: bold; }
        .btn:hover { background: #001854; }
        .btn-audio { background: #4a5568; margin-top: 10px;}
        .recorder-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn-record { background-color: #059669; }
        .btn-record.recording { background-color: var(--recording); animation: pulse 1.5s infinite; }
        .btn-play-back { background-color: #7c3aed; }
        .btn-play-back:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .option-btn { background: white; border: 2px solid #cbd5e1; padding: 14px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 16px; color: #334155; font-weight: 500; }
        .option-btn:hover { border-color: var(--primary); background: #f8fafc; }
        .feedback { margin-top: 15px; font-weight: bold; font-size: 18px; text-align: center; min-height: 26px; }
        .correct { color: #16a34a; }
        .wrong { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1>UKVI A1 - Nuanjan's App</h1>
    <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
    <div id="days-count" class="days-count">Day 1 of 60 Day Challenge</div>
    <div class="score-board">
        <span>Score: <span id="score">0</span></span>
        <select id="topic-nav" onchange="jumpToQuestion(this.value)" style="padding: 5px; border-radius: 5px;"></select>
    </div>

    <div class="card">
        <span class="topic-tag" id="tag">Loading...</span><br>
        <div class="thai-hint" id="thai-translation"></div>
        <div class="question-text" id="question"></div>
        <button class="btn btn-audio" onclick="speakQuestion()">🔊 Listen</button>
        <div class="recorder-section">
            <button id="record-btn" class="btn btn-record" onclick="toggleRecording()">Start Recording</button>
            <button id="playback-btn" class="btn btn-play-back" onclick="playYourVoice()" disabled>Listen to Yourself</button>
        </div>
    </div>

    <div class="options-grid" id="options-container"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="next-btn" onclick="nextQuestion()" style="display:none; background-color: var(--accent);">Next Question ➡️</button>
    <div style="text-align:center; margin-top:20px;"><button class="btn" style="background:#64748b; font-size:12px; width:auto;" onclick="confirmReset()">🔄 Restart Course</button></div>
</div>

<script>
    const data = [
        { topic: "Personal Details", question: "Could you tell me your full name, please?", thai: "คุณช่วยบอกชื่อนามสกุลเต็มของคุณหน่อยได้ไหม?", options: ["My name is Nuanjan.", "I come from Bangkok.", "Yes, here is my passport."], answer: "My name is Nuanjan." },
        { topic: "Personal Details", question: "Can you spell your first name?", thai: "คุณช่วยสะกดชื่อจริงของคุณได้ไหม?", options: ["Yes, it is N-U-A-N-J-A-N.", "Yes, I like spelling.", "No, I live in London."], answer: "Yes, it is N-U-A-N-J-A-N." },
        { topic: "Personal Details", question: "How old are you?", thai: "คุณอายุเท่าไหร่?", options: ["I am twenty-nine years old.", "I am thirty years old.", "I am twenty-five."], answer: "I am twenty-nine years old." },
        { topic: "Daily Life", question: "What do you usually do in the morning?", thai: "ปกติคุณทำอะไรตอนเช้า?", options: ["I have breakfast and coffee.", "I like watching TV at night.", "I work at 9 am."], answer: "I have breakfast and coffee." },
        { topic: "Housing", question: "How many rooms are there in your house?", thai: "ในบ้านของคุณมีกี่ห้อง?", options: ["There are five rooms in my house.", "I live in a big city.", "I like my bedroom."], answer: "There are five rooms in my house." },
        { topic: "Travel", question: "How do you travel to the city center?", thai: "คุณเดินทางไปใจกลางเมืองอย่างไร?", options: ["I usually take the bus.", "I walk to the park.", "I like traveling in summer."], answer: "I usually take the bus." },
        { topic: "Weather", question: "What is the weather like in your country today?", thai: "อากาศที่ประเทศของคุณวันนี้เป็นอย่างไร?", options: ["It is very hot and sunny.", "I like winter very much.", "It is raining in the UK."], answer: "It is very hot and sunny." },
        { topic: "Work", question: "What time do you start work?", thai: "คุณเริ่มงานกี่โมง?", options: ["I start work at eight o'clock.", "I work for a large company.", "I like my job very much."], answer: "I start work at eight o'clock." },
        { topic: "Shopping", question: "How much is this shirt?", thai: "เสื้อตัวนี้ราคาเท่าไหร่?", options: ["It is twenty pounds.", "It is a blue shirt.", "I like shopping online."], answer: "It is twenty pounds." },
        { topic: "Leisure", question: "What is your favorite hobby?", thai: "งานอดิเรกที่คุณชอบที่สุดคืออะไร?", options: ["I like reading books.", "I like going to work.", "I live in Thailand."], answer: "I like reading books." },
        { topic: "Food", question: "What is your favorite food?", thai: "อาหารที่คุณชอบที่สุดคืออะไร?", options: ["My favorite food is Thai Pad Thai.", "I have lunch at one pm.", "I do not like cooking."], answer: "My favorite food is Thai Pad Thai." },
        { topic: "Education", question: "Why do you want to live in the UK?", thai: "ทำไมคุณถึงอยากไปอยู่สหราชอาณาจักร?", options: ["To live with my husband and study.", "I want to visit London.", "The UK is very cold."], answer: "To live with my husband and study." }
    ];

    let currentIndex = 0, score = 0, mediaRecorder = null, audioUrl = null, isRecording = false, recordingsHistory = {};

    function populateNavigation() {
        const nav = document.getElementById('topic-nav');
        data.forEach((item, index) => {
            const opt = document.createElement('option');
            opt.value = index; opt.innerText = `${index + 1}. ${item.topic}`;
            nav.appendChild(opt);
        });
    }

    function jumpToQuestion(idx) { currentIndex = parseInt(idx); saveAppState(); loadQuestion(); }
    function saveAppState() { localStorage.setItem('ukvi_app_state', JSON.stringify({ index: currentIndex, savedScore: score })); }
    
    function loadAppState() {
        const saved = localStorage.getItem('ukvi_app_state');
        if (saved) { const p = JSON.parse(saved); currentIndex = p.index; score = p.savedScore; document.getElementById('score').innerText = score; }
        loadQuestion();
    }

    function loadQuestion() {
        const q = data[currentIndex];
        document.getElementById('tag').innerText = q.topic;
        document.getElementById('thai-translation').innerText = q.thai;
        document.getElementById('question').innerText = q.question;
        document.getElementById('topic-nav').value = currentIndex;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('feedback').innerText = "";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = opt;
            b.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
                if(opt === q.answer) { score += 10; document.getElementById('score').innerText = score; document.getElementById('feedback').innerText = "Correct! 🌟"; document.getElementById('feedback').className = "feedback correct"; }
                else { document.getElementById('feedback').innerText = "Incorrect."; document.getElementById('feedback').className = "feedback wrong"; }
                document.getElementById('next-btn').style.display = "block";
                saveAppState();
            };
            container.appendChild(b);
        });
        document.getElementById('progress-bar').style.width = ((currentIndex + 1) / data.length) * 100 + "%";
    }

    function speakQuestion() { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(document.getElementById('question').innerText); u.lang = 'en-GB'; window.speechSynthesis.speak(u); }
    
    async function toggleRecording() {
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => { audioUrl = URL.createObjectURL(new Blob(chunks)); document.getElementById('playback-btn').disabled = false; };
            mediaRecorder.start(); isRecording = true; document.getElementById('record-btn').innerText = "🛑 Stop Recording";
        } else {
            mediaRecorder.stop(); isRecording = false; document.getElementById('record-btn').innerText = "Start Recording";
        }
    }

    function playYourVoice() { if (audioUrl) new Audio(audioUrl).play(); }
    function nextQuestion() { currentIndex++; if(currentIndex >= data.length) currentIndex = 0; saveAppState(); loadQuestion(); }
    function confirmReset() { if(confirm("Restart?")) { localStorage.clear(); location.reload(); } }
    window.onload = () => { populateNavigation(); loadAppState(); };
</script>
</body>
</html>
